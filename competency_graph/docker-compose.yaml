services:
  app:
    build:
      context: ./app
      dockerfile: dockerfile.competency_graph
    ports:
      - "80:80"
    environment:
      - GRAPHDB_URL=http://graphdb:7200
      - GRAPHDB_REPOSITORY=competencies
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/competency_graph
    restart: unless-stopped

  graphdb:
    image: ontotext/graphdb:10.6.1
    ports:
      - "7200:7200"
    volumes:
      - graphdb_data:/opt/graphdb/home
      - ./app/dao/repository-config.ttl:/opt/graphdb/home/repository-config.ttl
      - ./app/dao/init-repository.sh:/docker-entrypoint-initdb.d/init-repository.sh
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:7200/rest/repositories/competencies",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=competency_graph
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/db/migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  graphdb_data:
  postgres_data:
