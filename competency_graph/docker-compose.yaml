version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: dockerfile.competency_graph
    ports:
      - "8000:8000"
    environment:
      - GRAPHDB_URL=http://graphdb:7200
      - GRAPHDB_REPOSITORY=competencies
      - REDIS_URL=redis://redis:6379
      - POSTGRESQL_HOST=postgres
      - POSTGRESQL_PORT=5432
      - POSTGRESQL_DB=competency_graph
      - POSTGRESQL_USER=postgres
      - POSTGRESQL_PASSWORD=postgres
      - DATABASE_CONNECTIONS_AMOUNT=10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      graphdb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=competency_graph
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/db/migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  graphdb:
    image: ontotext/graphdb:9.11.1
    ports:
      - "7200:7200"
    volumes:
      - graphdb_data:/opt/graphdb/home
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7200/rest/repositories"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  graphdb_data:
